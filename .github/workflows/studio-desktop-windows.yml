name: Build Studio Desktop (Windows)

on:
  push:
    branches: [main]
    paths:
      - "desktop/studio-desktop/**"
      - ".github/workflows/studio-desktop-windows.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Install (desktop)
        run: pnpm -C desktop/studio-desktop install --frozen-lockfile

      - name: Build (portable exe)
        run: pnpm -C desktop/studio-desktop build:win

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hyperblog-studio-desktop-windows
          path: desktop/studio-desktop/dist/*.exe
